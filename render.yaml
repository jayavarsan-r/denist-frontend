services:
  - type: web
    name: denist-frontend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # NOTE: this pilot/testing box runs in development mode ON PURPOSE so the dev
      # OTP (123456) stays active. Because it points at the SHARED Supabase DB, the
      # startup guard (config/env.js) requires ALLOW_DEV_AGAINST_REMOTE_DB=true,
      # which is set in the Render dashboard (sync:false below). BEFORE real clinics
      # use this service: set NODE_ENV=production and DELETE ALLOW_DEV_AGAINST_REMOTE_DB.
      - key: NODE_ENV
        value: development
      - key: ALLOW_DEV_AGAINST_REMOTE_DB
        sync: false
      - key: PORT
        value: 10000
      # Set these in the Render dashboard — never commit secrets
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_DEV_OTP
        value: "false"
      - key: DEV_OTP
        value: ""
